configuration:
  device_name:
    name: "APsystems EZ1 Name"
    description: "APsystems EZ1 Gerätename. (Standard: `Solar PV Balkonkraftwerk`)"
  homa_room:
    name: "HomA Raum"
    description: "HomA Raumname (Standard: `Sensors`)"
  hass_area:
    name: "Home Assistant Area"
    description: "Home Assistant Bereichsname (Standard: `Energie`)"
  aps_ecu_ip:
    name: "APsystems ECU IP"
    description: "IP-Adresse der APsystems ECU"
  aps_ecu_port:
    name: "APsystems ECU Port"
    description: "Portnummer für die APsystems ECU (Standard: `8050`)"
  aps_ecu_update_interval:
    name: "APsystems ECU Aktualisierungsintervall"
    description: "Aktualisierungsintervall für die APsystems ECU in Sekunden (Standard: `10`)"
  latitude:
    name: "Breitengrad"
    description: "Breitengrad des Standorts für Sonnenauf- und -untergangsberechnungen (Standard: `52.5162`)"
  longitude:
    name: "Längengrad"
    description: "Längengrad des Standorts für Sonnenauf- und -untergangsberechnungen (Standard: `13.3889`)"
  mqtt_host:
    name: "MQTT Hostname"
    description: "Hostname eines remote MQTT brokers. Falls leer wird der interne MQTT Broker verwendet"
  mqtt_port:
    name: "MQTT Port"
    description: "Port eines remote MQTT brokers. Falls leer wird der interne MQTT Broker verwendet"
  mqtt_user:
    name: "MQTT User"
    description: "User eines remote MQTT brokers. Falls leer wird der default username des internen MQTT Broker verwendet"
  mqtt_password:
    name: "MQTT Password"
    description: "Password eines remote MQTT brokers. Falls leer wird der interne MQTT Broker verwendet"
  mqtt_ca_certs:
    name: "MQTT CA Certificates"
    description: "CA Certificates Dateiname. Leer lassen für Port 1883."
  debug:
    name: "Debug"
    description: "Ausgabe von Debug-Nachrichten"
